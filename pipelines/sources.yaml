# ═══════════════════════════════════════════════════════════════════════════
# Pilot — Opportunity Intelligence Sources
#
# Declarative registry of every source the discovery pipeline monitors.
# Adding a new source is a config change + PR — no Python/TS code needed
# unless the source requires a custom parser.
#
# Schema:
#   id:              Stable identifier (matches opportunities.source column)
#   name:            Human label for the Discover surface
#   tier:            Quality tier (1=highest signal, 4=broadest coverage)
#   strategy:        Scrapling fetch strategy (fetcher|dynamic|stealthy|api)
#   schedule:        pg-boss cron expression (null = on-demand only)
#   url:             Fetch target (template vars: {page}, {date}, {limit})
#   parser:          Parser module (dot-separated Python import path)
#   quality_weight:  Base quality multiplier for heuristic scoring (0-100)
#   freshness_window_hours: Opportunities older than this are deprioritised
#   dedup_strategy:  How to handle near-duplicates (hash|semantic|both)
#   requires_auth:   Whether the source needs a session/token (public|session|oauth)
#   enabled:         Toggle without deleting the source entry
#   tags:            Default tags applied to every opportunity from this source
# ═══════════════════════════════════════════════════════════════════════════

sources:
  # ─── Tier 1: High-signal curated (quality_weight ≥ 35) ─────────────────

  - id: yc
    name: Y Combinator Directory
    tier: 1
    strategy: api
    schedule: "0 3 * * 0"  # Sunday 3am UTC
    url: "https://45bwzj1sgc-dsn.algolia.net/1/indexes/YCCompany_production/query"
    parser: pipelines.yc_scraper.scrape_yc
    quality_weight: 45
    freshness_window_hours: 168  # 7 days
    dedup_strategy: both
    requires_auth: public
    enabled: true
    tags: [yc, accelerator, startup]

  - id: hn_show
    name: Hacker News — Show HN
    tier: 1
    strategy: api
    schedule: "0 */6 * * *"  # every 6 hours
    url: "https://hn.algolia.com/api/v1/search?tags=show_hn&hitsPerPage={limit}"
    parser: pipelines.scraper.parsers.hn
    quality_weight: 38
    freshness_window_hours: 48
    dedup_strategy: both
    requires_auth: public
    enabled: true
    tags: [hn, show_hn, builder]

  - id: hn_launch
    name: Hacker News — Launch HN
    tier: 1
