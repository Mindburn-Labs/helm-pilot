name: Documentation Gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docs:
    name: Coverage and truth
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs gates
        run: npm run docs:coverage && npm run docs:truth
