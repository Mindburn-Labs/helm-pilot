name: Restore Drill

# Weekly verification that the latest production backup can be restored
# onto a fresh Postgres and passes schema + tenancy smoke checks. Does NOT
# touch production. Spins up an ephemeral container, restores into it,
# validates, and tears down.

on:
  schedule:
    - cron: '0 4 * * 0' # Sundays 04:00 UTC
  workflow_dispatch:
    inputs:
      backup_key:
        description: 'Specific S3 backup key (leave blank for latest)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  drill:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: drill
          POSTGRES_PASSWORD: drill
          POSTGRES_DB: drill_restore
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://drill:drill@localhost:5432/drill_restore
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_DEFAULT_REGION || 'fra1' }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
      BACKUP_BUCKET: ${{ vars.BACKUP_BUCKET }}
      BACKUP_ENCRYPTION_PASSPHRASE: ${{ secrets.BACKUP_ENCRYPTION_PASSPHRASE }}
    steps:
      - uses: actions/checkout@v4

      - name: Fail fast if backup restore config is incomplete
        run: |
          missing=0
          for name in BACKUP_BUCKET S3_ENDPOINT AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY BACKUP_ENCRYPTION_PASSPHRASE; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for restore drills"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install restore tooling
        run: |
          sudo apt-get update -y
          sudo apt-get install -y awscli postgresql-client gnupg

      - name: Locate latest backup
        id: backup
        run: |
          if [ -n "${{ inputs.backup_key }}" ]; then
            key="${{ inputs.backup_key }}"
          else
            key=$(aws s3 ls "s3://$BACKUP_BUCKET/backups/" --recursive --endpoint-url "$S3_ENDPOINT" | awk '{print $4}' | grep '\.sql\.gz\.gpg$' | sort | tail -n 1)
          fi
          if [ -z "$key" ]; then
            echo "::error::No encrypted production backup found in s3://$BACKUP_BUCKET/backups/"
            exit 1
          fi
          echo "key=$key" >> "$GITHUB_OUTPUT"
          echo "Selected backup key: $key"

      - name: Download backup
        run: |
          aws s3 cp "s3://$BACKUP_BUCKET/${{ steps.backup.outputs.key }}" /tmp/backup.sql.gz.gpg --endpoint-url "$S3_ENDPOINT"
          aws s3 cp "s3://$BACKUP_BUCKET/${{ steps.backup.outputs.key }}.sha256" /tmp/backup.sql.gz.gpg.sha256 --endpoint-url "$S3_ENDPOINT"
          expected=$(awk '{print $1}' /tmp/backup.sql.gz.gpg.sha256)
          actual=$(sha256sum /tmp/backup.sql.gz.gpg | awk '{print $1}')
          test "$expected" = "$actual"
          printf '%s' "$BACKUP_ENCRYPTION_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 --pinentry-mode loopback --decrypt --output /tmp/backup.sql.gz /tmp/backup.sql.gz.gpg
          ls -lh /tmp/backup.sql.gz /tmp/backup.sql.gz.gpg

      - name: Restore into ephemeral DB
        run: |
          gunzip -c /tmp/backup.sql.gz | psql "$DATABASE_URL"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Verify schema integrity
        run: npx tsx scripts/verify-schema.ts

      - name: Record drill summary
        if: always()
        run: |
          {
            echo "## Restore Drill Results"
            echo ""
            echo "**Backup:** \`${{ steps.backup.outputs.key }}\`"
            echo "**Database:** pgvector/pgvector:pg17 (ephemeral)"
            if [ "$?" -eq 0 ]; then
              echo ""
              echo "✓ Restore + schema verification succeeded"
            else
              echo ""
              echo "✗ Restore drill failed — investigate immediately (backup integrity at risk)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on failure
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        run: |
          curl -X POST -H 'Content-Type: application/json' \
            --data "{\"text\": \"🚨 Pilot restore drill FAILED for backup ${{ steps.backup.outputs.key }} on $(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
            "${{ vars.SLACK_WEBHOOK_URL }}"
