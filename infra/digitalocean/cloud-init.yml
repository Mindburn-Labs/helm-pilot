#cloud-config
package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - git
  - jq
  - rsync
  - ufw
  - fail2ban

write_files:
  - path: /etc/sysctl.d/99-pilot.conf
    permissions: '0644'
    content: |
      vm.max_map_count=262144

runcmd:
  - sysctl --system
  - curl -fsSL https://get.docker.com | sh
  - systemctl enable --now docker
  - mkdir -p /opt/pilot/current /opt/pilot/shared
  - ufw allow OpenSSH
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable
  - touch /opt/pilot/cloud-init-ready
