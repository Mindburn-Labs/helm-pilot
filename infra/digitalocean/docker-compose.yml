services:
  postgres:
    container_name: helm-pilot-postgres
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-helm_pilot}
      POSTGRES_USER: ${POSTGRES_USER:-helm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-helm}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  helm:
    container_name: helm-pilot-helm
    image: ${HELM_IMAGE:-ghcr.io/mindburn-labs/helm-oss:latest}
    expose:
      - '8080'
      - '8081'
    env_file:
      - path: ../../.env
        required: false
    environment:
      HELM_BIND_ADDR: '0.0.0.0'
      HELM_PORT: '8080'
      HELM_HEALTH_PORT: '8081'
      HELM_REGION: ${HELM_REGION:-digitalocean}
      HELM_ENABLE_OPENAI_PROXY: '1'
      HELM_UPSTREAM_URL: ${HELM_UPSTREAM_URL:-https://openrouter.ai/api/v1}
      EVIDENCE_SIGNING_KEY: ${EVIDENCE_SIGNING_KEY:-pilot-dev-ephemeral-key-change-me}
      DATABASE_URL: postgres://${POSTGRES_USER:-helm}:${POSTGRES_PASSWORD:-helm}@postgres:5432/helm_governance?sslmode=disable
      HELM_OSS_EVIDENCE_DIR: /home/helm/data/evidence
      HELM_OSS_RECEIPTS_DIR: /home/helm/data/receipts
    volumes:
      - helm_data:/home/helm/data
      - ../../packs/founder_ops.v1.json:/home/helm/packs/founder_ops.v1.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q --spider http://localhost:8081/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'

  helm-pilot:
    container_name: helm-pilot
    image: ${PILOT_IMAGE:-helm-pilot:local}
    build:
      context: ../..
      dockerfile: Dockerfile
    expose:
      - '3100'
    env_file:
      - path: ../../.env
        required: false
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-helm}:${POSTGRES_PASSWORD:-helm}@postgres:5432/${POSTGRES_DB:-helm_pilot}
      APP_URL: ${APP_URL:-https://${DOMAIN:-localhost}}
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://${DOMAIN:-localhost}}
      HELM_GOVERNANCE_URL: http://helm:8080
      HELM_HEALTH_URL: http://helm:8081
      HELM_FAIL_CLOSED: '1'
      RUN_MIGRATIONS_ON_STARTUP: ${RUN_MIGRATIONS_ON_STARTUP:-true}
    volumes:
      - app_storage:/app/data/storage
      - app_backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      helm:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3100/health').then(r => process.exit(r.ok ? 0 : 1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '50m'
        max-file: '5'

  web:
    container_name: helm-pilot-web
    image: ${WEB_IMAGE:-helm-pilot-web:local}
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    expose:
      - '3000'
    environment:
      NEXT_PUBLIC_API_URL: ${APP_URL:-https://${DOMAIN:-localhost}}
    depends_on:
      helm-pilot:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '3'

  caddy:
    container_name: helm-pilot-caddy
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TLS_EMAIL: ${TLS_EMAIL:-admin@helm-pilot.dev}
    volumes:
      - ../docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      helm-pilot:
        condition: service_healthy
      web:
        condition: service_started
    restart: unless-stopped

  backup-cron:
    container_name: helm-pilot-backup-cron
    image: mcuadros/ofelia:latest
    depends_on:
      helm-pilot:
        condition: service_healthy
    command: daemon --docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      ofelia.job-exec.backup.schedule: ${BACKUP_CRON_SCHEDULE:-0 3 * * *}
      ofelia.job-exec.backup.container: helm-pilot
      ofelia.job-exec.backup.command: bash /app/scripts/backup.sh create
    profiles:
      - backup
    restart: unless-stopped

volumes:
  pgdata:
  app_storage:
  app_backups:
  helm_data:
  caddy_data:
  caddy_config:
