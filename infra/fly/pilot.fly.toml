# HELM Pilot — main app (gateway + bot + orchestrator).
#
# Deploy AFTER infra/fly/helm.fly.toml. Pilot fails-closed if HELM is not
# reachable at HELM_GOVERNANCE_URL, so the sidecar must be healthy first.
#
# See infra/fly/README.md for the full deploy runbook.
app = "helm-pilot"
primary_region = "ams"

[build]
  dockerfile = "../../Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3100"
  LOG_LEVEL = "info"
  # HELM sidecar addresses — Fly 6PN private DNS. The HELM sidecar app name is
  # "helm-pilot-helm" (see infra/fly/helm.fly.toml). If you rename it there,
  # update these too.
  HELM_GOVERNANCE_URL = "http://helm-pilot-helm.internal:8080"
  HELM_HEALTH_URL = "http://helm-pilot-helm.internal:8081"
  # Production must keep fail-closed on. Override to 0 only in explicit dev
  # smoke tests.
  HELM_FAIL_CLOSED = "1"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "helm_pilot_data"
  destination = "/app/data"
  initial_size = "1"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"

[metrics]
  port = 9091
  path = "/metrics"

[[statics]]
  guest_path = "/app/apps/telegram-miniapp/dist"
  url_prefix = "/app"
