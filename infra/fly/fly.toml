app = "helm-pilot"
primary_region = "ams"

[build]
  dockerfile = "../../Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3100"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 3100
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[http_service.checks]]
  grace_period = "10s"
  interval = "15s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[mounts]
  source = "helm_pilot_data"
  destination = "/app/data"
  initial_size = "1"

[[vm]]
  size = "shared-cpu-2x"
  memory = "1024mb"

[metrics]
  port = 9091
  path = "/metrics"

[[statics]]
  guest_path = "/app/apps/telegram-miniapp/dist"
  url_prefix = "/app"
