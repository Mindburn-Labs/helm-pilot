global:
  scrape_interval: 15s
  evaluation_interval: 30s
  external_labels:
    cluster: pilot

rule_files:
  - prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # ─── Gateway (HTTP + agent-loop + LLM cost metrics) ───
  - job_name: pilot
    static_configs:
      - targets: ['pilot:3100']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── HELM sidecar (guardian decisions + kernel latency) ───
  - job_name: helm-sidecar
    static_configs:
      - targets: ['helm-sidecar:8420']
    metrics_path: /metrics
    scrape_interval: 15s

  # ─── Postgres (connection pool, query duration, DB size) ───
  # Phase 13 Track D — requires postgres-exporter in docker-compose.
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s

  # ─── Telegram bot (webhook latency, update counts) ───
  # Bot exposes metrics on port 3110 when run as a standalone process.
  # When embedded in the gateway these are already on :3100 — this job
  # is a no-op then (prometheus silently fails scraping).
  - job_name: pilot-bot
    static_configs:
      - targets: ['pilot-bot:3110']
    metrics_path: /metrics
    scrape_interval: 30s

  # ─── Node exporter (host CPU, mem, disk) ───
  # Optional — only scraped when node-exporter is reachable.
  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
